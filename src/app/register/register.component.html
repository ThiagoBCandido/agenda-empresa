<div class="register-page">
  <div class="register-card">
    <div class="brand">
      <img src="/assets/logo2.png" alt="Logo" class="brand-logo" />
      <h1>Notes</h1>
      <p>Crie sua conta para acessar suas anotações</p>
    </div>

    <div class="form-group">
      <label for="name">Nome</label>
      <input id="name" type="text" [(ngModel)]="name" placeholder="Seu nome"/>
    </div>

    <div class="form-group">
      <label for="email">E-mail</label>
      <input id="email" type="email" [(ngModel)]="email" placeholder="seuemail@teste.com"/>
    </div>

    <div class="form-group">
      <label for="password">Senha</label>

      <div class="password-field">
        <input id="password" [type]="showPassword ? 'text' : 'password'" [(ngModel)]="password" placeholder="Digite sua senha"/>

        <button class="password-toggle" type="button" (click)="togglePassword()" [attr.aria-label]="showPassword ? 'Ocultar senha' : 'Mostrar senha'" [title]="showPassword ? 'Ocultar senha' : 'Mostrar senha'">
          <img
            [src]="showPassword ? 'assets/icons/eye-open.png' : 'assets/icons/eye-closed.png'"
            [alt]="showPassword ? 'Ocultar senha' : 'Mostrar senha'"
          />
        </button>
      </div>
    </div>

    <div class="form-group">
      <label for="confirmPassword">Confirmar senha</label>

      <div class="password-field">
        <input
          id="confirmPassword"
          [type]="showConfirmPassword ? 'text' : 'password'"
          [(ngModel)]="confirmPassword"
          placeholder="Confirme sua senha"
          (keyup.enter)="submit()"
        />

        <button
          class="password-toggle"
          type="button"
          (click)="toggleConfirmPassword()"
          [attr.aria-label]="showConfirmPassword ? 'Ocultar senha' : 'Mostrar senha'"
          [title]="showConfirmPassword ? 'Ocultar senha' : 'Mostrar senha'"
        >
          <img
            [src]="showConfirmPassword ? 'assets/icons/eye-open.png' : 'assets/icons/eye-closed.png'"
            [alt]="showConfirmPassword ? 'Ocultar senha' : 'Mostrar senha'"
          />
        </button>
      </div>
    </div>

    <div class="error" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>

    <button class="register-btn" type="button" (click)="submit()" [disabled]="loading">
      {{ loading ? 'Criando conta...' : 'Criar conta' }}
    </button>

    <button class="link-btn" type="button" (click)="goToLogin()">
      Já tenho conta
    </button>
  </div>
</div>
