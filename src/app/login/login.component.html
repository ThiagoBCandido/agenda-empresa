<div class="login-page">
  <div class="login-card">
    <div class="brand">
      <img src="/assets/logo2.png" alt="Logo" class="brand-logo" />
      <h1>Notes</h1>
      <p>Entre para acessar suas anotações</p>
    </div>

    <div class="form-group">
      <label for="email">E-mail</label>
      <input
        id="email"
        type="email"
        [(ngModel)]="email"
        placeholder="seuemail@teste.com"
      />
    </div>

    <div class="form-group">
      <label for="password">Senha</label>

      <div class="password-field">
        <input
          id="password"
          [type]="showPassword ? 'text' : 'password'"
          [(ngModel)]="password"
          placeholder="Digite sua senha"
          (keyup.enter)="submit()"
        />

        <button
          class="password-toggle"
          type="button"
          (click)="togglePassword()"
          [attr.aria-label]="showPassword ? 'Ocultar senha' : 'Mostrar senha'"
          [title]="showPassword ? 'Ocultar senha' : 'Mostrar senha'"
        >
          <img
            [src]="showPassword ? 'assets/icons/eye-open.png' : 'assets/icons/eye-closed.png'"
            [alt]="showPassword ? 'Ocultar senha' : 'Mostrar senha'"
          />
        </button>
      </div>
    </div>

    <div class="error" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>

    <button class="login-btn" type="button" (click)="submit()" [disabled]="loading">
      {{ loading ? 'Entrando...' : 'Entrar' }}
    </button>

    <button class="link-btn" type="button" (click)="goToRegister()">
      Criar conta
    </button>
  </div>
</div>
