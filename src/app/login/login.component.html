<div class="login-page">
  <div class="login-card">
    <div class="brand">
      <img src="/assets/logo2.png" alt="Logo" class="brand-logo" />
      <h1>Notes</h1>
      <p>Entre para acessar suas anotações</p>
    </div>
    <div class="form-group">
      <label for="email">E-mail</label>
      <input id="email" type="email" [(ngModel)]="email" (ngModelChange)="clearError()" placeholder="seuemail@teste.com" autocomplete="username" spellcheck="false"/>
    </div>
    <div class="form-group">
      <label for="password">Senha</label>
      <div class="password-field">
        <input id="password" [type]="showPassword ? 'text' : 'password'" [(ngModel)]="password" (ngModelChange)="clearError()" placeholder="Digite sua senha" (keyup.enter)="submit()" autocomplete="current-password"/>
        <button class="password-toggle" type="button" (click)="togglePassword()" [disabled]="loading" [attr.aria-label]="showPassword ? 'Ocultar senha' : 'Mostrar senha'" [title]="showPassword ? 'Ocultar senha' : 'Mostrar senha'">
          <img [src]="showPassword ? 'assets/icons/eye-open.png' : 'assets/icons/eye-closed.png'" [alt]="showPassword ? 'Ocultar senha' : 'Mostrar senha'"/>
        </button>
      </div>
    </div>
    <div class="error" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>
    <button class="login-btn" type="button" (click)="submit()" [disabled]="loading">
      {{ loading ? 'Entrando...' : 'Entrar' }}
    </button>
    <button class="link-btn" type="button" (click)="goToRegister()" [disabled]="loading">
      Criar conta
    </button>
  </div>
</div>
