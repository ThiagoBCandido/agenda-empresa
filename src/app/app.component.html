<div class="session-message" *ngIf="!isAuthenticated && sessionMessage">{{ sessionMessage }}</div>
<app-login *ngIf="!isAuthenticated && authMode === 'login'"></app-login>
<app-register *ngIf="!isAuthenticated && authMode === 'register'"></app-register>
<ng-container *ngIf="isAuthenticated">
  <div class="app-shell" (click)="closePriorityMenu()">
    <aside class="sidebar" [class.collapsed]="sidebarCollapsed" (click)="$event.stopPropagation()">
      <button class="sidebar-toggle" type="button" (click)="toggleSidebar()">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <button class="side-item" [class.active]="activePage === 'principal'" type="button" (click)="setPage('principal')">
        <img class="side-icon" src="/assets/icons/icon-home.png" alt="Menu principal" />
        <span class="side-label" *ngIf="!sidebarCollapsed">Menu principal</span>
      </button>
      <button class="side-item" [class.active]="activePage === 'concluidos'" type="button" (click)="setPage('concluidos')">
        <img class="side-icon" src="/assets/icons/icon-done.png" alt="Concluídos" />
        <span class="side-label" *ngIf="!sidebarCollapsed">Concluídos</span>
      </button>
      <button class="side-item" [class.active]="activePage === 'lixeira'" type="button" (click)="setPage('lixeira')">
        <img class="side-icon" src="/assets/icons/icon-trash.png" alt="Lixeira" />
        <span class="side-label" *ngIf="!sidebarCollapsed">Lixeira</span>
      </button>
      <button class="side-item" [class.active]="activePage === 'perfil'" type="button" (click)="setPage('perfil')">
        <img class="side-icon" src="/assets/icons/icon-profile.png" alt="Perfil" />
        <span class="side-label" *ngIf="!sidebarCollapsed">Perfil</span>
      </button>
      <button class="side-item logout" type="button" (click)="logout()">
        <img class="side-icon" src="/assets/icons/icon-exit.png" alt="Sair" />
        <span class="side-label" *ngIf="!sidebarCollapsed">Sair</span>
      </button>
    </aside>
    <div class="main-area">
      <header class="topbar" (click)="$event.stopPropagation()">
        <div class="brand">
          <img class="brand-logo" src="/assets/logo2.png" alt="Logo Notes" />
         <div class="user-badge" *ngIf="isAuthenticated">
            <div class="user-avatar-mini" *ngIf="currentUserPhoto; else fallbackTopAvatar">
              <img [src]="currentUserPhoto" alt="Foto de perfil" />
            </div>
            <ng-template #fallbackTopAvatar>
              <div class="user-avatar-fallback">
                {{ (currentUserName || 'U').charAt(0).toUpperCase() }}
              </div>
            </ng-template>
            <span class="user-name">{{ currentUserName }}</span>
            <span class="user-email">{{ currentUserEmail }}</span>
          </div>
        </div>
        <div class="tabs-wrap" *ngIf="activePage === 'principal'">
          <nav class="tabs">
            <button class="tab" [class.active]="activeTab === 'calendario'" (click)="setTab('calendario')">Calendário</button>
            <button class="tab" [class.active]="activeTab === 'anotacoes'" (click)="setTab('anotacoes')">Anotações</button>
          </nav>
          <button class="theme-switch" type="button" (click)="toggleTheme()" [attr.aria-label]="themeAlt()" [title]="themeAlt()" [class.light]="theme === 'light'">
            <span class="theme-track"></span>
            <span class="theme-thumb">
              <img class="theme-icon" [src]="themeIcon()" [alt]="themeAlt()" />
            </span>
          </button>
        </div>
        <div class="page-title" *ngIf="activePage !== 'principal'">
          {{
            activePage === 'concluidos'
              ? 'Concluídos'
              : activePage === 'lixeira'
                ? 'Lixeira'
                : activePage === 'perfil'
                  ? 'Perfil'
                  : 'Sair'
          }}
        </div>
        <div class="actions" (click)="$event.stopPropagation()" *ngIf="activePage === 'principal'">
          <button class="btn-primary" (click)="togglePriorityMenu()">Novo</button>
          <div class="priority-menu" *ngIf="showPriorityMenu">
            <div class="priority-title">Escolha o nível de prioridade</div>
            <button class="priority-item p-high" (click)="createNote('alta')">Alta (Importante)</button>
            <button class="priority-item p-med" (click)="createNote('media')">Média</button>
            <button class="priority-item p-low" (click)="createNote('baixa')">Baixa</button>
          </div>
        </div>
      </header>
      <main class="content">
        <section class="panel" *ngIf="activePage === 'principal'">
          <div class="workarea" [class.mode-anotacoes]="activeTab === 'anotacoes'" [class.sidebar-cover]="!sidebarCollapsed">
            <div class="pane pane-left">
              <app-calendario #cal></app-calendario>
            </div>
            <div class="pane pane-right">
              <app-anotacoes (noteSelected)="openNoteFromAnnotations($event)"></app-anotacoes>
            </div>
            <div class="tampa" aria-hidden="true" (click)="toggleCoverSide()" title="Alternar entre calendário e anotações">
              <div class="tampa-inner">
                <img class="logo" src="/assets/logo.png" alt="Logo" />
              </div>
            </div>
          </div>
        </section>
        <section class="panel internal-page" *ngIf="activePage === 'concluidos'">
          <app-concluidos></app-concluidos>
        </section>
        <section class="panel internal-page" *ngIf="activePage === 'lixeira'">
          <app-lixeira></app-lixeira>
        </section>
        <section class="panel internal-page" *ngIf="activePage === 'perfil'">
          <app-perfil></app-perfil>
        </section>
      </main>
    </div>
    <app-deadline-alert></app-deadline-alert>
    <app-toast></app-toast>
  </div>
</ng-container>
